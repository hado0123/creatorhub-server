name: CD

on:
  push:
    branches: [ main ]

concurrency:
  group: prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew clean bootJar -x test

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/creatorhub-server
          echo "image_name=${IMAGE_NAME,,}" >> $GITHUB_OUTPUT
          echo "image_tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_name }}:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_NAME: ${{ steps.meta.outputs.image_name }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          PROD_ENV: ${{ secrets.PROD_ENV }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          envs: IMAGE_NAME,IMAGE_TAG,PROD_ENV,GHCR_USERNAME,GHCR_TOKEN
          script: |
            cd /home/ubuntu/creatorhub/server

            echo "$PROD_ENV" > .env

            sudo docker login ghcr.io -u $GHCR_USERNAME -p $GHCR_TOKEN

            sudo docker image prune -af

            export IMAGE_FULL_NAME=$IMAGE_NAME:$IMAGE_TAG

            sudo docker pull $IMAGE_FULL_NAME

            echo "IMAGE_FULL_NAME=$IMAGE_FULL_NAME" >> .env

            sudo docker compose --env-file .env -f docker-compose.prod.yml down
            sudo docker compose --env-file .env -f docker-compose.prod.yml up -d