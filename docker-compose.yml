version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: creatorhub-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: creatorhub
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - creatorhub-network
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: creatorhub-redis
    command: [ "redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}" ]
    volumes:
      - redis-data:/data
    networks:
      - creatorhub-network
    restart: unless-stopped

volumes:
  redis-data:

networks:
  creatorhub-network:
    name: creatorhub-network
