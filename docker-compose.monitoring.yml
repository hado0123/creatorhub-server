services:
  prometheus:
    image: prom/prometheus:latest
    container_name: creatorhub-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - creatorhub-network

  grafana:
    image: grafana/grafana:latest
    container_name: creatorhub-grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - creatorhub-network
    volumes:
      - grafana-data:/var/lib/grafana

networks:
  creatorhub-network:
    external: true

volumes:
  grafana-data: