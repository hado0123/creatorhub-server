server:
  port: 8000

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql: trace
    org.springframework.web: debug
    com.creatorhub: debug

spring:
  config:
    import: application-local-secret.yml
  jpa:
    properties:
      hibernate:
        format_sql: true
        show_sql: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

jwt:
  access-token-exp-min: 600
  refresh-token-exp-days: 7

file:
  max:
    thumbnail-size: 1MB
    manuscript-size: 5MB
