spring:
  application:
    name: creatorhub-server
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_updates: true
        order_inserts: true
    database-platform: org.hibernate.dialect.MySQLDialect
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  web:
    resources:
      add-mappings: false # 정적 리소스 서빙 안함

cloud:
  aws:
    region: ap-northeast-2