version: "3.8"

services:
  app:
#    image: 계정id/creatorhub-app:1.0
    build: .
    container_name: creatorhub-app
    depends_on:
      - mysql
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: prod # application-prod.yml
      SPRING_SERVER_PORT: ${SPRING_SERVER_PORT}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CALLBACK_RESIZE_SECRET: ${CALLBACK_RESIZE_SECRET}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      FILE_MAX_THUMBNAIL_SIZE_BYTES: ${FILE_MAX_THUMBNAIL_SIZE_BYTES}
      FILE_MAX_MANUSCRIPT_SIZE_BYTES: ${FILE_MAX_MANUSCRIPT_SIZE_BYTES}
    ports:
      - "8000:8000"
    networks:
      - creatorhub-network
    restart: unless-stopped